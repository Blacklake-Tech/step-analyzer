name: Mirror image to Tencent CCR

# 把 ghcr.io 上的镜像直传（registry-to-registry）到腾讯云容器镜像服务 CCR 个人版。
# 用 crane copy 流式搬运 layer，不在 runner 上落完整 docker 镜像，CCR 已有的 layer 自动跳过。
# 在 Actions 页手动 Run workflow，填要搬运的 tag 即可。
#
# 需要在 repo Settings → Secrets and variables → Actions 配置：
#   CCR_USERNAME = 100019179737
#   CCR_PASSWORD = 腾讯云 CCR 的「访问凭证 / 登录密码」（在容器镜像服务控制台设置，不是腾讯云账号密码）
on:
  workflow_dispatch:
    inputs:
      tags:
        description: '要直传的 tag（逗号分隔，如：latest,main）'
        required: true
        default: 'latest'

env:
  SRC: ghcr.io/blacklake-tech/step-analyzer
  DST: ccr.ccs.tencentyun.com/blacklake-tech/step-analyzer

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 首次要跨境上传整镜像(~2.5-3GB)，给足时间
    permissions:
      contents: read
      packages: read    # 读 ghcr（源已公开，保留以防日后转私有）
    steps:
      - name: Install crane
        run: |
          VERSION=v0.20.2
          curl -fsSL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin crane
          crane version

      - name: Log in to registries
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CCR_USERNAME: ${{ secrets.CCR_USERNAME }}
          CCR_PASSWORD: ${{ secrets.CCR_PASSWORD }}
        run: |
          echo "$GHCR_TOKEN"   | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "$CCR_PASSWORD" | crane auth login ccr.ccs.tencentyun.com -u "$CCR_USERNAME" --password-stdin

      - name: Copy ghcr -> ccr
        run: |
          IFS=',' read -ra TAGS <<< "${{ github.event.inputs.tags }}"
          for raw in "${TAGS[@]}"; do
            tag="$(echo "$raw" | xargs)"   # 去空格
            [ -z "$tag" ] && continue
            echo "::group::copy ${tag}"
            # build-push-action 默认带 provenance attestation，ghcr 上是个 OCI index
            # （含 linux/amd64 镜像 + attestation-manifest）。腾讯云 CCR 个人版解析不了这种
            # index/attestation，会出现 PUT 成功但 docker pull not found。
            # 先解析出 linux/amd64 的单一镜像 manifest digest，只把它推到 CCR（扁平化）。
            digest="$(crane digest --platform linux/amd64 "${SRC}:${tag}" 2>/dev/null || true)"
            # CCR 不支持从 ghcr 跨仓库 mount，首次每层都要真上传(~2.5-3GB，跨境较慢)；
            # 不加单步 timeout，让它传完。已传完的层会持久化，重跑时自动 HEAD->200 跳过（增量续传）。
            # crane 每传完一层会打印 "pushed blob: ..."，看这个判断进度。
            if [ -n "$digest" ]; then
              echo "flatten OCI index -> ${SRC}@${digest}"
              crane copy "${SRC}@${digest}" "${DST}:${tag}"
            else
              echo "source 非 index，原样复制"
              crane copy "${SRC}:${tag}" "${DST}:${tag}"
            fi
            # runner 能连 CCR，回读确认 tag 在 CCR 上可解析
            echo "CCR ${DST}:${tag} digest = $(crane digest "${DST}:${tag}")"
            echo "::endgroup::"
          done
